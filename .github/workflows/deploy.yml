name: Build & Deploy Web

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Vue
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: https://api.rizky.com          # ganti sesuai domainmu
          VITE_CENTRAL_HOSTS: rizky.com,www.rizky.com  # host non-tenant
      - uses: actions/upload-artifact@v4
        with: { name: dist, path: dist/ }

  deploy:
    name: Deploy static ke VPS
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with: { name: dist, path: dist }
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts
      - name: Rsync dist ke VPS
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key" \
            dist/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/rizky-project-web/
